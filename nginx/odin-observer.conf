# ODIN Observer — Nginx Reverse Proxy Configuration
# Placeholder: update server_name with your real domain before deployment

upstream odin_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream odin_frontend {
    server 127.0.0.1:5173;
    keepalive 32;
}

# HTTP → HTTPS redirect (when SSL is enabled)
server {
    listen 80;
    listen [::]:80;
    server_name odin.innovadataco.com;  # ← UPDATE THIS

    # Uncomment after Certbot SSL setup:
    # return 301 https://$server_name$request_uri;

    # For initial deploy without SSL, serve directly:
    include /etc/nginx/odin-observer-locations.conf;
}

