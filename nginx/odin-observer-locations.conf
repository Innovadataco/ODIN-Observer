# Shared location blocks for ODIN Observer
# Included by both HTTP and HTTPS server blocks

# API proxy — all /api/* routes go to Express backend
location /api/ {
    proxy_pass http://odin_backend/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
}

# Health check endpoint (no auth)
location /health {
    proxy_pass http://odin_backend/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    access_log off;
}

# Auth callback routes → backend
location /auth/ {
    proxy_pass http://odin_backend/auth/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Static frontend — everything else serves React SPA
location / {
    proxy_pass http://odin_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
}

# Static assets with caching
location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    proxy_pass http://odin_frontend;
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
}
